# ==========================================================
# PROMETHEUS LOCKSCREEN
# ==========================================================

general {
    hide_cursor = false
    grace = 3
    disable_loading_bar = true
    no_fade_in = false
}

background {
    monitor =

    # Replace with your wallpaper path
    path = ~/Pictures/Wallpapers/prometheus.png

    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 1.08
    brightness = 0.90
    vibrancy = 0.15
    vibrancy_darkness = 0.15
}

# ==========================================================
# TIME
# ==========================================================

label {
    monitor =

    text = cmd[update:1000] echo "$(date +"%H:%M")"

    color = rgba(E2E8F0FF)

    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 160

    halign = center
    valign = center
}

# ==========================================================
# DATE
# ==========================================================

label {
    monitor =

    text = cmd[update:60000] echo "$(date +"%A • %d %B %Y")"

    color = rgba(22D3EEFF)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 105

    halign = center
    valign = center
}

# ==========================================================
# HOSTNAME
# ==========================================================

label {
    monitor =

    text = PROMETHEUS

    color = rgba(3B82F6FF)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 40

    halign = center
    valign = center
}

# ==========================================================
# PASSWORD BOX
# ==========================================================

input-field {
    monitor =

    size = 320, 58

    outline_thickness = 2

    dots_size = 0.25
    dots_spacing = 0.30

    dots_center = true

    fade_on_empty = false

    outer_color = rgba(3B82F6FF)
    inner_color = rgba(0A0E14CC)
    font_color = rgba(E2E8F0FF)

    check_color = rgba(22D3EEFF)
    fail_color = rgba(FF5555FF)

    placeholder_text = Password

    position = 0, -70

    halign = center
    valign = center

    rounding = 12
}

# ==========================================================
# FOOTER
# ==========================================================

label {
    monitor =

    text = Press ESC to cancel

    color = rgba(64748BFF)

    font_size = 12
    font_family = JetBrainsMono Nerd Font

    position = 0, -145

    halign = center
    valign = center
}
